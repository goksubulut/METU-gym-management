# METU Gym Management System — CI (SRS 8.6: test + build + imaj derleme)
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (build + e2e testler)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: metugym
          POSTGRES_PASSWORD: metugym
          POSTGRES_DB: metugym
        ports:
          - "5433:5432"
        options: >-
          --health-cmd "pg_isready -U metugym -d metugym"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://metugym:metugym@localhost:5433/metugym?schema=public
      JWT_ACCESS_SECRET: ci_access_secret
      JWT_REFRESH_SECRET: ci_refresh_secret
      APP_BASE_URL: http://localhost:5173
      SLOT_DURATION_MINUTES: 30
      SLOT_CAPACITY: 10
      GYM_OPEN_HOUR: 8
      GYM_CLOSE_HOUR: 22
      BOOKING_WINDOW_DAYS: 14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npx prisma db seed
      - run: npm run build
      - run: npm run test:e2e

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build

  docker:
    name: Docker imajları derlenir
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: API ve Web imajlarını derle
        run: docker compose build
