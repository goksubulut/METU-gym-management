# METU Gym Management System — geliştirme ve taşınabilir kurulum (NFR-5: Docker ile paketleme)
# Şimdilik yalnızca PostgreSQL; API ve Nginx servisleri DevOps adımında eklenecek.
services:
  db:
    image: postgres:16-alpine
    container_name: metugym-db
    environment:
      POSTGRES_USER: metugym
      POSTGRES_PASSWORD: metugym_dev_password
      POSTGRES_DB: metugym
    ports:
      # Host tarafında 5433: makinede 5432'yi kullanan yerel bir PostgreSQL
      # kurulumu var; çakışmamak için farklı port yayınlanıyor.
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metugym -d metugym"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
