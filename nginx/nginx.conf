# METU Gym Management System — Nginx (SRS 8.5)
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # API — konteyner ağı üzerinden NestJS'e
  location /api/ {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Swagger dokümantasyonu
  location /docs {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
  }

  # Videolar/fotoğraflar: doğrudan diskteki paylaşılan klasörden,
  # HTTP range destekli (FR-VD-1). API'yi meşgul etmez.
  location /media/ {
    alias /srv/media/;
    add_header Accept-Ranges bytes;
    expires 7d;
  }

  # SPA: bilinmeyen yollar index.html'e düşer (react-router)
  location / {
    try_files $uri $uri/ /index.html;
  }
}
