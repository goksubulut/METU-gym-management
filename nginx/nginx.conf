# METU Gym Management System — Nginx (SRS 8.5)
server {
  listen 80;
  server_name _;

  # --- Güvenlik başlıkları (proje güvenlik kuralı gereği) ---
  # always: hata yanıtlarında da eklensin. Not: nginx'te bir location kendi
  # add_header'ını tanımlarsa üst seviye başlıkları DEVRALMAZ; bu yüzden
  # /media/ bloğunda da kritik başlık tekrar edilir (aşağıya bakın).
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  # CSP: Google Fonts'a izin verir; script/medya same-origin. Uygulama inline
  # script kullanmaz (index.html tek bir harici module script yükler).
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; media-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
  # HSTS yalnızca gerçek HTTPS arkasında anlamlı; TLS terminasyonu kurulunca aç.
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  root /usr/share/nginx/html;
  index index.html;

  # API — konteyner ağı üzerinden NestJS'e
  location /api/ {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Swagger dokümantasyonu
  location /docs {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
  }

  # Videolar/fotoğraflar: doğrudan diskteki paylaşılan klasörden,
  # HTTP range destekli (FR-VD-1). API'yi meşgul etmez.
  location /media/ {
    alias /srv/media/;
    add_header Accept-Ranges bytes;
    # Bu blok kendi add_header'ını tanımladığı için üst seviye güvenlik
    # başlıklarını devralmaz; kritik olanlar burada tekrar edilir.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    expires 7d;
  }

  # SPA: bilinmeyen yollar index.html'e düşer (react-router)
  location / {
    try_files $uri $uri/ /index.html;
  }
}
